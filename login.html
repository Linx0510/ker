<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Kerama Marazzi</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Дополнительные стили для страницы входа */
        body {
            background: linear-gradient(135deg, #0056b3, #007bff);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 0;
        }
        
        .logo {
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
        }
        
        .auth-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .auth-card {
            background: white;
            border-radius: 10px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .auth-header h1 {
            color: #0056b3;
            margin-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            border-color: #0056b3;
            outline: none;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: #0056b3;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .btn:hover {
            background: #004494;
        }
        
        .auth-links {
            text-align: center;
            margin-top: 20px;
        }
        
        .auth-links a {
            color: #0056b3;
            text-decoration: none;
        }
        
        .auth-links a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 6px;
            margin-top: 20px;
            display: none;
        }
        
        .success-message {
            background: #efe;
            color: #393;
            padding: 12px;
            border-radius: 6px;
            margin-top: 20px;
            display: none;
        }
        
        .test-credentials {
            background: #f8f9fa;
            border-radius: 6px;
            padding: 15px;
            margin-top: 25px;
            font-size: 0.9rem;
        }
        
        .test-credentials h4 {
            color: #0056b3;
            margin-bottom: 10px;
        }
        
        .test-credentials p {
            margin-bottom: 5px;
            color: #555;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">Kerama Marazzi</div>
        </div>
    </header>

    <main class="main-content">
        <div class="container auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h1>Вход в систему</h1>
                    <p>Введите свои учетные данные для доступа к платформе обучения Kerama Marazzi</p>
                </div>
                
                <form id="login-form">
                    <div class="form-group">
                        <label for="email">Рабочий email</label>
                        <input type="email" id="email" placeholder="Введите ваш рабочий email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Пароль</label>
                        <input type="password" id="password" placeholder="Введите ваш пароль" required>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn">Войти</button>
                    </div>
                    <div class="auth-links">
                        <p>Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
                        <p><a href="index.html">Вернуться на главную</a></p>
                    </div>
                    <div id="login-error" class="error-message" style="display: none;" role="alert" aria-live="polite"></div>
                </form>
                
                </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy;Kerama Marazzi.</p>
            </div>
        </div>
    </footer>

    <script src="js/i18n.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
