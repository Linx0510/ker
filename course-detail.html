<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Курс — Kerama Marazzi</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .course-detail-header {
            background: white;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
        .course-detail-content {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
        }
        .course-sidebar, .course-main {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
        .progress-bar {
            height: 10px;
            background: #eee;
            border-radius: 5px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: var(--km-primary);
        }
        .lessons-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .lesson-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 15px;
            background: #f8f9fa;
            border-radius: 6px;
            text-decoration: none;
            color: var(--km-dark);
            border-left: 4px solid transparent;
        }
        .lesson-item:hover { background: #e9ecef; }
        .lesson-item.completed { border-left-color: var(--km-success); }
        .lesson-test-required {
            margin-top: 4px;
            display: inline-block;
            font-size: 12px;
            color: #7a4d00;
            background: #fff3cd;
            border: 1px solid #ffe69c;
            border-radius: 999px;
            padding: 2px 8px;
        }
        @media (max-width: 900px) {
            .course-detail-content { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo km-logo">
                <i class="fas fa-industry"></i>
                <span>Kerama Marazzi</span>
            </div>
            <nav class="nav" id="main-nav"></nav>
            <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="main-nav">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="course-detail-header">
                <p><a href="courses.html">← Мои курсы</a></p>
                <h1 id="course-title">Загрузка...</h1>
                <p class="course-description" id="course-description"></p>
                <p><i class="fas fa-clock"></i> <span id="course-duration">—</span> · <span id="course-lessons-count">—</span></p>
                <div class="progress-bar"><div class="progress-fill" id="course-progress-bar" style="width:0%"></div></div>
                <p>Прогресс: <span id="course-progress-percent">0%</span></p>
            </div>

            <div class="course-detail-content">
                <aside class="course-sidebar">
                    <h3>Уроки</h3>
                    <div class="lessons-list" id="lessons-list">
                        <div class="loading">Загрузка...</div>
                    </div>
                </aside>
                <section class="course-main">
                    <h2>О курсе</h2>
                    <p id="course-full-description"></p>
                    <h3>Что вы узнаете</h3>
                    <ul id="course-learning-list"></ul>
                    <h3>Для кого</h3>
                    <p id="course-audience">—</p>
                </section>
            </div>
        </div>
    </main>

    <script src="js/i18n.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/courses.js"></script>
</body>
</html>
