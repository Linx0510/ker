<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои курсы — Kerama Marazzi</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo km-logo">
                <i class="fas fa-industry"></i>
                <span>Kerama Marazzi</span>
            </div>
            <nav class="nav" id="main-nav"></nav>
            <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="main-nav">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="courses-header">
                <h1>Мои курсы</h1>
                <p>Курсы, назначенные вам администратором</p>
            </div>

            <div class="filters-section">
                <div class="filter-group">
                    <label for="course-search">Поиск по названию</label>
                    <div class="input-with-icon">
                        <i class="fas fa-search"></i>
                        <input type="text" id="course-search" placeholder="Введите название курса...">
                    </div>
                </div>
            </div>

            <div class="courses-grid" id="courses-container">
                <div class="loading">Загрузка курсов...</div>
            </div>
        </div>
    </main>

    <script src="js/i18n.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/courses.js"></script>
</body>
</html>
